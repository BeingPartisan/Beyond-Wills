<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Intestate Calculator</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: var(--radius) var(--radius) 0 0;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .stage-card {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .stage-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: var(--text);
            font-size: 1.4rem;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        h3 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 16px;
            margin-top: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            color: var(--text);
            background: #fff;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .radio-option {
            flex: 1;
            min-width: 140px;
            position: relative;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .radio-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            margin: 0;
            background: #f8fafc;
            color: var(--text-muted);
            text-align: center;
        }

        .radio-option label:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        .radio-option input[type="radio"]:checked+label {
            border-color: var(--primary);
            background: #eff6ff;
            color: var(--primary-dark);
        }

        .calc-btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--primary);
            color: white;
            display: none;
        }

        .calc-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            color: var(--text-muted);
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .add-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #eff6ff;
        }

        .remove-btn {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            background: #fca5a5;
        }

        .child-row {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary);
            position: relative;
        }

        .child-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 10px;
            align-items: end;
        }

        @media (max-width: 600px) {
            .child-row-grid {
                grid-template-columns: 1fr;
            }
        }

        .child-row .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .results {
            margin-top: 20px;
            display: none;
        }

        .share-item {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #legalNote {
            background: #eff6ff;
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 0 8px 8px 0;
            color: #1e40af;
            font-size: 0.95rem;
            margin-top: 20px;
            margin-bottom: 20px;
            display: none;
            line-height: 1.5;
        }

        @media print {
            body {
                background: white;
            }

            header {
                background: #1e293b !important;
                color: white !important;
                border-radius: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .add-btn,
            .remove-btn,
            .calc-btn {
                display: none !important;
            }

            .card {
                box-shadow: none;
                border: 1px solid #e2e8f0;
            }
        }

/* -------------------------------------------- */
        .back-home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            padding: 10px 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 1000;
        }

        .back-home-btn .arrow {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .back-home-btn:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.25);
        }

        .back-home-btn:hover .arrow {
            transform: translateX(-3px);
        }

    </style>
</head>

<body>

    <div class="container">
        <!-- Back to Home Button -->
        <a href="../index.html#calculator" class="back-home-btn">
            <span class="arrow">←</span> Back to Home
        </a>

        <!-- Header Area -->
        <header>
            <h1>Intestate Succession Calculator</h1>
            <p>Indian Succession Act, 1925</p>
        </header>

        <div class="card stage-card active" id="stage-1">
            <h3>Stage 1: Spouse</h3>
            <label>Is there a surviving spouse (widow/widower)?</label>
            <div class="radio-group">
                <div class="radio-option"><input type="radio" name="spouse" id="spouse_yes" value="yes"><label
                        for="spouse_yes">Yes</label></div>
                <div class="radio-option"><input type="radio" name="spouse" id="spouse_no" value="no"><label
                        for="spouse_no">No</label></div>
            </div>
        </div>

        <div class="card stage-card" id="stage-2">
            <h3>Stage 2: Lineal Descendants</h3>
            <label>Are there any surviving children or grandchildren?</label>
            <div class="radio-group">
                <div class="radio-option"><input type="radio" name="descendants" id="desc_yes" value="yes"><label
                        for="desc_yes">Yes</label></div>
                <div class="radio-option"><input type="radio" name="descendants" id="desc_no" value="no"><label
                        for="desc_no">No</label></div>
            </div>
        </div>

        <div class="card stage-card" id="stage-2-children">
            <h3>Lineal Descendants Details</h3>
            <div id="childrenContainer"></div>
            <button class="add-btn" onclick="addChild()">+ Add Child</button>
        </div>

        <div class="card stage-card" id="stage-3">
            <h3>Stage 3: Parents</h3>
            <label>Is the intestate's Father alive?</label>
            <div class="radio-group">
                <div class="radio-option"><input type="radio" name="father" id="father_yes" value="yes"><label
                        for="father_yes">Yes</label></div>
                <div class="radio-option"><input type="radio" name="father" id="father_no" value="no"><label
                        for="father_no">No</label></div>
            </div>
        </div>

        <div class="card stage-card" id="stage-4">
            <h3>Stage 4: Mother & Siblings</h3>
            <label>Is the intestate's Mother alive?</label>
            <div class="radio-group" style="margin-bottom: 20px;">
                <div class="radio-option"><input type="radio" name="mother" id="mother_yes" value="yes"><label
                        for="mother_yes">Yes</label></div>
                <div class="radio-option"><input type="radio" name="mother" id="mother_no" value="no" checked><label
                        for="mother_no">No</label></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div><label>Surviving Siblings</label><input type="number" id="survivingSiblings" value="0" min="0">
                </div>
                <div><label>Pre-deceased Siblings<br><small style="font-weight:normal; color:#64748b;">(who left living
                            children)</small></label><input type="number" id="deceasedSiblings" value="0" min="0"></div>
            </div>
        </div>

        <div id="legalNote"></div>
        <button id="calcBtn" class="calc-btn" onclick="calculateShares()">Calculate Exact Shares</button>

        <div id="results" class="card results">
            <h3>Distribution Breakdown</h3>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        const s1 = document.getElementById('stage-1');
        const s2 = document.getElementById('stage-2');
        const s2Children = document.getElementById('stage-2-children');
        const s3 = document.getElementById('stage-3');
        const s4 = document.getElementById('stage-4');
        const calcBtn = document.getElementById('calcBtn');

        document.querySelectorAll('input[name="spouse"]').forEach(r => r.addEventListener('change', () => { s2.classList.add('active'); checkReadyState(); }));
        document.querySelectorAll('input[name="descendants"]').forEach(r => r.addEventListener('change', (e) => {
            if (e.target.value === 'yes') { s2Children.classList.add('active'); s3.classList.remove('active'); s4.classList.remove('active'); updateLegalNote("Under law, the presence of lineal descendants excludes parents and siblings from inheritance."); }
            else { s2Children.classList.remove('active'); s3.classList.add('active'); document.querySelectorAll('input[name="father"]').forEach(r => r.checked = false); s4.classList.remove('active'); updateLegalNote("Since there are no lineal descendants, the estate passes to the next class of heirs (parents)."); }
            checkReadyState();
        }));
        document.querySelectorAll('input[name="father"]').forEach(r => r.addEventListener('change', (e) => {
            if (e.target.value === 'yes') { s4.classList.remove('active'); updateLegalNote("Under law, the father excludes the mother and all siblings from inheritance."); }
            else { s4.classList.add('active'); updateLegalNote("Since there is no father, the estate passes to the mother and siblings."); }
            checkReadyState();
        }));

        function checkReadyState() {
            const spouse = document.querySelector('input[name="spouse"]:checked'); const desc = document.querySelector('input[name="descendants"]:checked'); const father = document.querySelector('input[name="father"]:checked');
            let isReady = false;
            if (spouse && desc) { if (desc.value === 'yes') { isReady = true; } else if (desc.value === 'no' && father) { isReady = true; } }
            calcBtn.style.display = isReady ? 'block' : 'none'; document.getElementById("results").style.display = "none";
        }

        let childrenData = [{ id: Date.now(), name: "Child 1", status: "alive", grandchildren: 0 }];

        function renderChildren() {
            const container = document.getElementById("childrenContainer"); container.innerHTML = "";
            childrenData.forEach((child) => {
                const row = document.createElement("div"); row.className = "child-row";
                row.innerHTML = `
                ${childrenData.length > 1 ? `<button class="remove-btn" onclick="removeChildrenData(${child.id})">Remove</button>` : ''}
                <div class="child-row-grid">
                    <div><label>Name</label><input type="text" value="${child.name}" onchange="updateChild(${child.id}, 'name', this.value)"></div>
                    <div><label>Status</label><select onchange="updateChild(${child.id}, 'status', this.value)"><option value="alive" ${child.status === 'alive' ? 'selected' : ''}>Alive</option><option value="deceased" ${child.status === 'deceased' ? 'selected' : ''}>Pre-deceased</option></select></div>
                    <div style="display: ${child.status === 'deceased' ? 'block' : 'none'};"><label>Grandchildren</label><input type="number" min="0" value="${child.grandchildren}" onchange="updateChild(${child.id}, 'grandchildren', this.value)"></div>
                </div>
            `;
                container.appendChild(row);
            });
        }

        function addChild() { childrenData.push({ id: Date.now(), name: `Child ${childrenData.length + 1}`, status: "alive", grandchildren: 0 }); renderChildren(); }
        function removeChildrenData(id) { childrenData = childrenData.filter(c => c.id !== id); renderChildren(); }
        function updateChild(id, field, value) { const child = childrenData.find(c => c.id === id); if (child) { child[field] = field === 'grandchildren' ? parseInt(value) || 0 : value; if (field === 'status') renderChildren(); } }
        renderChildren();

        function calculateShares() {
            const hasSpouse = document.querySelector('input[name="spouse"]:checked').value === 'yes';
            const pathDescendants = document.querySelector('input[name="descendants"]:checked').value === 'yes';
            let validBranches = []; let numBranches = 0;

            if (pathDescendants) { validBranches = childrenData.filter(c => c.status === 'alive' || (c.status === 'deceased' && c.grandchildren > 0)); numBranches = validBranches.length; }
            const pathFather = !pathDescendants && document.querySelector('input[name="father"]:checked').value === 'yes';
            const hasMother = !pathDescendants && !pathFather && document.querySelector('input[name="mother"]:checked')?.value === 'yes';
            const survivingSiblings = !pathDescendants && !pathFather ? (parseInt(document.getElementById("survivingSiblings").value) || 0) : 0;
            const deceasedSiblings = !pathDescendants && !pathFather ? (parseInt(document.getElementById("deceasedSiblings").value) || 0) : 0;
            const totalSiblingBranches = survivingSiblings + deceasedSiblings;
            let results = []; let spouseFraction = 0;

            if (hasSpouse) {
                if (numBranches > 0) { spouseFraction = 1 / 3; updateLegalNote("Under Section 33(a), since there are lineal descendants, the spouse inherits one-third of the estate."); results.push({ name: "Spouse", fraction: "1/3", percentage: 33.33, section: "Sec 33(a)" }); }
                else if (pathFather || hasMother || totalSiblingBranches > 0) { spouseFraction = 1 / 2; updateLegalNote("Under Section 33(b), since there are no lineal descendants but other heirs exist, the spouse inherits half of the estate."); results.push({ name: "Spouse", fraction: "1/2", percentage: 50.00, section: "Sec 33(b)" }); }
                else { spouseFraction = 1; updateLegalNote("Under Section 33(c), the entire estate devolves upon the spouse as no other heirs are present."); results.push({ name: "Spouse", fraction: "1/1 (All)", percentage: 100.00, section: "Sec 33(c)" }); }
            }

            let remainingFraction = 1 - spouseFraction;
            if (remainingFraction > 0) {
                if (numBranches > 0) {
                    const livingChildrenCount = validBranches.filter(c => c.status === 'alive').length;
                    if (livingChildrenCount === 0) {
                        let totalGrandchildren = validBranches.reduce((sum, child) => sum + child.grandchildren, 0); let sharePerGrandchild = remainingFraction / totalGrandchildren;
                        updateLegalNote("Under Section 38 (Per Capita), the remaining estate is divided equally among all surviving grandchildren.");
                        results.push({ name: `Each Grandchild (${totalGrandchildren} total)`, fraction: formatFraction(sharePerGrandchild), percentage: (sharePerGrandchild * 100).toFixed(2), section: "Sec 38 (Per Capita)" });
                    } else {
                        let sharePerBranch = remainingFraction / numBranches;
                        validBranches.forEach(child => {
                            if (child.status === 'alive') { updateLegalNote("Under Section 37 (Per Stirpes), the remaining estate is divided among the surviving descendants of each branch."); results.push({ name: child.name, fraction: formatFraction(sharePerBranch), percentage: (sharePerBranch * 100).toFixed(2), section: "Sec 37/40" }); }
                            else if (child.status === 'deceased' && child.grandchildren > 0) { let sharePerGrandchild = sharePerBranch / child.grandchildren; updateLegalNote("Under Section 40 (Per Stirpes), the remaining estate is divided among the surviving descendants of each deceased branch."); results.push({ name: `Each of ${child.name}'s children (${child.grandchildren})`, fraction: formatFraction(sharePerGrandchild), percentage: (sharePerGrandchild * 100).toFixed(2), section: "Sec 40 (Per Stirpes)" }); }
                        });
                    }
                } else if (pathDescendants && numBranches === 0) { updateLegalNote("You selected 'Yes' for descendants but added no valid heirs."); results.push({ name: "Error", fraction: "0/0", percentage: 0, section: "You selected 'Yes' for descendants but added no valid heirs." }); }
                else if (pathFather) { updateLegalNote("Under Section 42, since the father is alive, the estate passes to the father."); results.push({ name: "Father", fraction: formatFraction(remainingFraction), percentage: (remainingFraction * 100).toFixed(2), section: "Sec 42" }); }
                else {
                    const kindredDivisor = (hasMother ? 1 : 0) + totalSiblingBranches;
                    if (kindredDivisor > 0) {
                        const sharePerKindred = remainingFraction / kindredDivisor; const percentage = (sharePerKindred * 100).toFixed(2);
                        updateLegalNote("");
                        if (hasMother) { amendLegalNote("Under Section 43-46, the mother inherits a share of the estate."); results.push({ name: "Mother", fraction: formatFraction(sharePerKindred), percentage: percentage, section: "Sec 43-46" }) };
                        if (survivingSiblings > 0) { amendLegalNote("Under Section 43/47, each surviving sibling inherits a share of the estate."); results.push({ name: `Each Surviving Sibling (${survivingSiblings})`, fraction: formatFraction(sharePerKindred), percentage: percentage, section: "Sec 43/47" }) };
                        if (deceasedSiblings > 0) { amendLegalNote("Under Section 44/47, the branch of each pre-deceased sibling inherits a share of the estate."); results.push({ name: `Branch of Pre-deceased Sibling (${deceasedSiblings})`, fraction: formatFraction(sharePerKindred) + " (split)", percentage: percentage, section: "Sec 44/47" }) };
                    } else if (!hasSpouse) { updateLegalNote("Under Section 34 / 48, the estate passes to the government or the nearest remote kindred."); results.push({ name: "Government / Nearest Remote Kindred", fraction: "1/1 (All)", percentage: 100.00, section: "Sec 34 / 48" }); }
                }
            }

            const resultsDiv = document.getElementById("results"); const resultsContent = document.getElementById("resultsContent"); resultsContent.innerHTML = "";
            results.forEach(res => {
                const div = document.createElement("div"); div.className = "share-item";
                div.innerHTML = `<span><strong style="font-size: 1.1rem; color: #0f172a;">${res.name}</strong><br><small style="color: #64748b;">${res.section}</small></span><span style="text-align: right; color: #2563eb;"><strong style="font-size: 1.3rem;">${res.percentage}%</strong><br><small style="color: #334155; font-weight: 600;">${res.fraction} Share</small></span>`;
                resultsContent.appendChild(div);
            });
            resultsDiv.style.display = "block"; resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function formatFraction(decimal) {
            const tolerance = 0.0001;
            if (Math.abs(decimal - 1) < tolerance) return "1/1"; if (Math.abs(decimal - 1 / 2) < tolerance) return "1/2"; if (Math.abs(decimal - 1 / 3) < tolerance) return "1/3"; if (Math.abs(decimal - 2 / 3) < tolerance) return "2/3"; if (Math.abs(decimal - 1 / 4) < tolerance) return "1/4"; if (Math.abs(decimal - 1 / 5) < tolerance) return "1/5"; if (Math.abs(decimal - 1 / 6) < tolerance) return "1/6"; if (Math.abs(decimal - 1 / 8) < tolerance) return "1/8"; if (Math.abs(decimal - 1 / 9) < tolerance) return "1/9"; if (Math.abs(decimal - 1 / 10) < tolerance) return "1/10"; if (Math.abs(decimal - 1 / 12) < tolerance) return "1/12";
            for (let denominator = 2; denominator <= 50; denominator++) { let numerator = Math.round(decimal * denominator); if (Math.abs(decimal - (numerator / denominator)) < tolerance) return `${numerator}/${denominator}`; } return (decimal * 100).toFixed(2) + "%";
        }

        let currentNote = "";
        function updateLegalNote(message) {
            if (message === currentNote) return; currentNote = message;
            const note = document.getElementById("legalNote");
            if (message) { note.innerText = message; note.style.display = "block"; } else { note.style.display = "none"; }
        }
        function amendLegalNote(additionalMessage) {
            if (additionalMessage && additionalMessage !== currentNote) {
                if (currentNote == "") { currentNote = additionalMessage; } else { currentNote += "\n\n" + additionalMessage; }
                const note = document.getElementById("legalNote"); note.innerText = currentNote; note.style.display = "block";
            }
        }
    </script>

</body>

</html>
